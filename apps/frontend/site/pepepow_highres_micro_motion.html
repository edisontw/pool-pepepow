<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PEPEPOW Micro Motion Hero</title>
<style>
  :root {
    --pp-gold: #ffd45a;
    --pp-amber: #ff9f1c;
    --pp-blue: #2be7ff;
    --pp-deep: #07111c;
    --pp-green: #30d158;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background:
      radial-gradient(circle at 50% 20%, rgba(43,231,255,.18), transparent 34%),
      radial-gradient(circle at 20% 70%, rgba(255,180,40,.18), transparent 30%),
      #05080d;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .pepepow-motion {
    position: relative;
    width: min(92vw, 860px);
    aspect-ratio: 1 / 1;
    overflow: hidden;
    border-radius: 28px;
    isolation: isolate;
    background: #05080d;
    box-shadow:
      0 24px 80px rgba(0,0,0,.55),
      0 0 0 1px rgba(255,255,255,.12),
      0 0 55px rgba(43,231,255,.22);
  }

  .pepepow-motion img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scale(1.018);
    transform-origin: 48% 42%;
    filter: saturate(1.05) contrast(1.04);
    animation: pepepow-hero-drift 7s ease-in-out infinite alternate;
  }

  .pepepow-motion::before {
    content: "";
    position: absolute;
    inset: -20%;
    z-index: 2;
    pointer-events: none;
    background:
      radial-gradient(circle at 50% 16%, rgba(255,245,190,.72), rgba(255,196,53,.24) 8%, transparent 18%),
      radial-gradient(circle at 72% 42%, rgba(43,231,255,.18), transparent 24%),
      radial-gradient(circle at 25% 76%, rgba(255,194,52,.16), transparent 22%);
    mix-blend-mode: screen;
    opacity: .9;
    animation: pepepow-lamp-pulse 2.4s ease-in-out infinite;
  }

  .pepepow-motion::after {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    background:
      linear-gradient(105deg, transparent 0%, transparent 38%, rgba(255,255,255,.22) 44%, transparent 50%, transparent 100%),
      radial-gradient(circle at 50% 50%, transparent 62%, rgba(0,0,0,.28) 100%);
    transform: translateX(-130%);
    mix-blend-mode: screen;
    opacity: .75;
    animation: pepepow-scan 5.2s ease-in-out infinite;
  }

  .nodes {
    position: absolute;
    inset: 0;
    z-index: 4;
    pointer-events: none;
    opacity: .9;
    mix-blend-mode: screen;
  }

  .nodes circle {
    fill: var(--pp-blue);
    filter: drop-shadow(0 0 8px rgba(43,231,255,.9));
    animation: node-pulse 2.8s ease-in-out infinite;
  }

  .nodes path {
    stroke: rgba(43,231,255,.58);
    stroke-width: 1.2;
    fill: none;
    stroke-dasharray: 8 10;
    animation: node-flow 5s linear infinite;
  }

  .coin {
    position: absolute;
    z-index: 5;
    width: clamp(24px, 5vw, 54px);
    height: clamp(24px, 5vw, 54px);
    border-radius: 50%;
    display: grid;
    place-items: center;
    color: #271300;
    font-weight: 900;
    font-size: clamp(12px, 2vw, 24px);
    letter-spacing: -0.04em;
    background:
      radial-gradient(circle at 35% 28%, #fff4b0 0 12%, #ffd45a 30%, #d88a11 63%, #6b3904 100%);
    box-shadow:
      inset 0 0 0 3px rgba(255,255,255,.22),
      inset 0 0 0 6px rgba(97,49,4,.18),
      0 0 18px rgba(255,204,78,.75),
      0 10px 20px rgba(0,0,0,.35);
    transform-style: preserve-3d;
    animation: coin-float 4.8s ease-in-out infinite;
  }

  .coin::before {
    content: "";
    position: absolute;
    inset: 12%;
    border-radius: 50%;
    border: 2px solid rgba(84,42,4,.45);
  }

  .coin::after {
    content: "";
    position: absolute;
    inset: -18%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,210,84,.34), transparent 58%);
    z-index: -1;
  }

  .coin-a { left: 7%; top: 10%; animation-delay: -.4s; }
  .coin-b { right: 8%; top: 18%; width: clamp(18px, 3.7vw, 40px); height: clamp(18px, 3.7vw, 40px); animation-delay: -1.6s; }
  .coin-c { right: 9%; bottom: 16%; animation-delay: -2.8s; }
  .coin-d { left: 12%; bottom: 8%; width: clamp(18px, 3.6vw, 38px); height: clamp(18px, 3.6vw, 38px); animation-delay: -3.7s; }

  .spark {
    position: absolute;
    z-index: 6;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    pointer-events: none;
    background: #fff7b8;
    box-shadow: 0 0 14px #ffd45a, 0 0 28px rgba(43,231,255,.5);
    animation: spark-rise 4.6s linear infinite;
    opacity: 0;
  }

  .spark:nth-of-type(1) { left: 19%; bottom: 11%; animation-delay: .1s; }
  .spark:nth-of-type(2) { left: 38%; bottom: 4%; animation-delay: 1.1s; }
  .spark:nth-of-type(3) { left: 59%; bottom: 10%; animation-delay: 2.2s; }
  .spark:nth-of-type(4) { left: 80%; bottom: 17%; animation-delay: 3.2s; }
  .spark:nth-of-type(5) { left: 71%; bottom: 41%; animation-delay: .8s; }
  .spark:nth-of-type(6) { left: 23%; bottom: 53%; animation-delay: 2.8s; }

  .glow-ring {
    position: absolute;
    z-index: 4;
    left: 54%;
    top: 10%;
    width: 17%;
    aspect-ratio: 1;
    border-radius: 50%;
    border: 2px solid rgba(255,230,128,.52);
    box-shadow:
      0 0 18px rgba(255,210,92,.8),
      inset 0 0 22px rgba(255,224,107,.5);
    transform: translate(-50%, -50%);
    pointer-events: none;
    animation: ring-breathe 2.4s ease-in-out infinite;
  }

  .badge-shine {
    position: absolute;
    z-index: 6;
    left: 31%;
    top: 47%;
    width: 31%;
    height: 8%;
    transform: rotate(.5deg);
    overflow: hidden;
    border-radius: 8px;
    mix-blend-mode: screen;
    pointer-events: none;
  }

  .badge-shine::after {
    content: "";
    position: absolute;
    inset: -60% -20%;
    background: linear-gradient(100deg, transparent 25%, rgba(255,255,255,.55) 48%, transparent 66%);
    transform: translateX(-120%);
    animation: badge-sweep 3.9s ease-in-out infinite;
  }

  @keyframes pepepow-hero-drift {
    0% { transform: scale(1.018) translate3d(-.45%, -.25%, 0); }
    100% { transform: scale(1.045) translate3d(.45%, .35%, 0); }
  }

  @keyframes pepepow-lamp-pulse {
    0%,100% { opacity: .68; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.025); }
  }

  @keyframes pepepow-scan {
    0%, 46% { transform: translateX(-130%); opacity: 0; }
    58% { opacity: .8; }
    72%,100% { transform: translateX(130%); opacity: 0; }
  }

  @keyframes coin-float {
    0%,100% { transform: translate3d(0,0,0) rotateY(0deg) rotateZ(-3deg); }
    50% { transform: translate3d(0,-16px,0) rotateY(28deg) rotateZ(4deg); }
  }

  @keyframes spark-rise {
    0% { transform: translate3d(0,0,0) scale(.4); opacity: 0; }
    14% { opacity: .95; }
    100% { transform: translate3d(24px,-120px,0) scale(1.15); opacity: 0; }
  }

  @keyframes node-flow {
    to { stroke-dashoffset: -72; }
  }

  @keyframes node-pulse {
    0%,100% { transform: scale(1); opacity: .55; }
    50% { transform: scale(1.7); opacity: 1; }
  }

  @keyframes ring-breathe {
    0%,100% { opacity: .55; transform: translate(-50%, -50%) scale(.9); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
  }

  @keyframes badge-sweep {
    0%, 30% { transform: translateX(-130%); }
    58%, 100% { transform: translateX(130%); }
  }

  @media (max-width: 520px) {
    .pepepow-motion { border-radius: 18px; }
    .nodes { opacity: .7; }
    .coin { box-shadow: inset 0 0 0 2px rgba(255,255,255,.22), 0 0 12px rgba(255,204,78,.68); }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: .001ms !important;
      animation-iteration-count: 1 !important;
      scroll-behavior: auto !important;
    }
  }
</style>
</head>
