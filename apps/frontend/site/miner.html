<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PEPEPOW Pool Miner Lookup</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="/assets/styles.css">
  </head>
  <body data-page="miner">
    <div class="shell">
      <header class="topbar">
        <div class="brand-lockup">
          <img class="brand-logo" src="/2025_PEPEW_Logo_HQ_128.png" alt="PEPEPOW logo" width="40" height="40">
          <div>
            <p class="eyebrow">PEPEPOW Community Pool</p>
            <h1>Miner lookup</h1>
          </div>
        </div>
        <nav class="nav">
          <a href="/">Dashboard</a>
          <a href="/blocks.html">Blocks</a>
          <a href="/payments.html">Payments</a>
          <a href="/miner.html">Miner Lookup</a>
          <a href="/connect.html">How to Mine</a>
          <a href="/api.html">API</a>
        </nav>
      </header>

      <main class="page-single">
        <section class="panel">
          <form id="miner-form" class="lookup-form">
            <label for="wallet-input">Wallet Address</label>
            <div class="lookup-row">
              <input
                id="wallet-input"
                name="wallet"
                type="text"
                placeholder="輸入你的 PEPEPOW 錢包地址..."
                value=""
              >
              <button class="button" type="submit">Lookup</button>
            </div>
          </form>
          <div id="miner-result" class="list-state empty-state">
            <strong>輸入 PEPEPOW 錢包地址來查詢礦工狀態。</strong>
            <p class="muted">資料會在 pool 收到 accepted shares 後出現。這裡只顯示估算 hashrate、accepted shares、active workers 和 last share。</p>
            <a class="button" href="/connect.html">查看如何開始挖礦</a>
          </div>
        </section>
      </main>
    </div>

    <script src="/assets/app.js"></script>
  </body>
</html>
