# Upstream for the Python API
upstream pepepow_pool_api {
    server 127.0.0.1:8080;
    keepalive 8;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name pool.pepepow.net;

    # ACME challenge path for Certbot renewal
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server Block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pool.pepepow.net;

    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/pool.pepepow.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pool.pepepow.net/privkey.pem;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    client_max_body_size 1m;

    # Security Headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy no-referrer-when-downgrade always;
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' https:; img-src 'self' data: https:; connect-src 'self' https: wss:;" always;

    # Serve static frontend directly
    location / {
        root /home/ubuntu/pool-pepepow/apps/frontend/site;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # Reverse proxy /api/ to backend
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
        proxy_connect_timeout 3s;
        proxy_pass http://pepepow_pool_api;
    }

    # Do not expose daemon RPC, Redis, admin panels, or internal scripts
    location ~ ^/(rpc|redis|admin|internal)/ {
        return 404;
    }
}
